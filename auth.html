<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowDesk — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0f0e0c;
    --paper: #faf8f3;
    --cream: #f2ede2;
    --sage: #4a7c59;
    --sage-light: #d4e8d8;
    --sage-dark: #2d5238;
    --amber: #c9820a;
    --muted: #7a7468;
    --border: rgba(15,14,12,0.12);
    --error: #d85a30;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }

  [data-theme="dark"] {
    --ink: #f0ede6;
    --paper: #131210;
    --cream: #1e1c19;
    --sage: #5faa76;
    --sage-light: #172b20;
    --sage-dark: #90d4a8;
    --amber: #e09b2a;
    --muted: #8a8478;
    --border: rgba(240,237,230,0.1);
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
    transition: background 0.35s, color 0.35s;
  }

  /* LEFT PANEL — branding */
  .auth-left {
    background: #0f0e0c;
    padding: 3rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  [data-theme="dark"] .auth-left { background: #0a0908; }
  .auth-left::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 100%, rgba(74,124,89,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 10%, rgba(201,130,10,0.15) 0%, transparent 60%);
  }
  /* Moving grid */
  .auth-left::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: grid-drift 25s linear infinite;
  }
  @keyframes grid-drift {
    0% { background-position: 0 0; }
    100% { background-position: 48px 48px; }
  }
  .auth-brand {
    position: relative; z-index: 1;
    font-family: var(--font-display);
    font-size: 1.6rem; letter-spacing: -0.02em;
    color: #faf8f3; text-decoration: none;
  }
  .auth-brand span { color: #5faa76; }

  .auth-quote {
    position: relative; z-index: 1;
  }
  .auth-quote blockquote {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    line-height: 1.2; letter-spacing: -0.02em;
    color: #faf8f3; font-style: italic;
    margin-bottom: 1rem;
  }
  .auth-quote blockquote em { color: #5faa76; font-style: italic; }
  .auth-quote-attr {
    font-size: 0.82rem; color: rgba(250,248,243,0.4);
    letter-spacing: 0.05em;
  }

  .auth-left-stats {
    display: flex; gap: 2rem;
    position: relative; z-index: 1;
  }
  .auth-stat { }
  .auth-stat-num {
    font-family: var(--font-display);
    font-size: 1.8rem; color: #faf8f3;
    letter-spacing: -0.03em; line-height: 1;
  }
  .auth-stat-label { font-size: 0.78rem; color: rgba(250,248,243,0.4); margin-top: 0.2rem; }

  /* RIGHT PANEL — form */
  .auth-right {
    display: flex; align-items: center; justify-content: center;
    padding: 3rem 2rem;
    position: relative;
  }
  .auth-right-inner { width: 100%; max-width: 400px; }

  .auth-tabs {
    display: flex; gap: 0; margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
  }
  .auth-tab {
    font-family: var(--font-body);
    font-size: 0.9rem; font-weight: 500;
    color: var(--muted); background: none; border: none;
    padding: 0.75rem 0; margin-right: 2rem;
    cursor: pointer; position: relative;
    transition: color 0.2s;
  }
  .auth-tab::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--sage);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.25s ease;
  }
  .auth-tab.active { color: var(--ink); }
  .auth-tab.active::after { transform: scaleX(1); }

  .auth-form { display: flex; flex-direction: column; gap: 1.1rem; }
  .auth-form.hidden { display: none; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-label { font-size: 0.82rem; font-weight: 500; color: var(--muted); }
  .form-input {
    font-family: var(--font-body);
    font-size: 0.95rem; color: var(--ink);
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .form-input:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
  }
  .form-input::placeholder { color: var(--muted); opacity: 0.6; }

  .form-error {
    font-size: 0.82rem; color: var(--error);
    background: rgba(216,90,48,0.08);
    border: 1px solid rgba(216,90,48,0.2);
    border-radius: 8px; padding: 0.6rem 0.9rem;
    display: none;
  }
  .form-error.visible { display: block; }

  .form-success {
    font-size: 0.85rem; color: var(--sage);
    background: var(--sage-light);
    border: 1px solid rgba(74,124,89,0.2);
    border-radius: 8px; padding: 0.6rem 0.9rem;
    display: none;
  }
  .form-success.visible { display: block; }

  .btn-submit {
    background: var(--sage); color: #fff;
    padding: 0.85rem; border-radius: 100px;
    font-family: var(--font-body);
    font-size: 0.95rem; font-weight: 500;
    border: none; cursor: pointer; width: 100%;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(74,124,89,0.3);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-submit:hover:not(:disabled) { background: var(--sage-dark); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(74,124,89,0.4); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    display: flex; align-items: center; gap: 1rem;
    color: var(--muted); font-size: 0.8rem; margin: 0.5rem 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .btn-google {
    background: var(--cream); color: var(--ink);
    padding: 0.75rem; border-radius: 100px;
    font-family: var(--font-body);
    font-size: 0.9rem; font-weight: 500;
    border: 1px solid var(--border);
    cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-google:hover { background: var(--paper); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,14,12,0.08); }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  .form-footer {
    text-align: center; margin-top: 0.5rem;
    font-size: 0.82rem; color: var(--muted);
  }
  .form-footer a { color: var(--sage); text-decoration: none; }
  .form-footer a:hover { text-decoration: underline; }

  .auth-back {
    position: absolute; top: 2rem; left: 2rem;
    font-size: 0.85rem; color: var(--muted);
    text-decoration: none; display: flex; align-items: center; gap: 0.4rem;
    transition: color 0.2s;
  }
  .auth-back:hover { color: var(--ink); }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .auth-left { display: none; }
    .auth-right { padding: 5rem 1.5rem 2rem; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="auth-left">
  <a href="index.html" class="auth-brand">Flow<span>Desk</span></a>

  <div class="auth-quote">
    <blockquote>"The secret of getting ahead is<br><em>getting started.</em>"</blockquote>
    <div class="auth-quote-attr">— Mark Twain</div>
  </div>

  <div class="auth-left-stats">
    <div class="auth-stat">
      <div class="auth-stat-num">42k+</div>
      <div class="auth-stat-label">Active students</div>
    </div>
    <div class="auth-stat">
      <div class="auth-stat-num">2.1M</div>
      <div class="auth-stat-label">Tasks completed</div>
    </div>
    <div class="auth-stat">
      <div class="auth-stat-num">98%</div>
      <div class="auth-stat-label">Satisfaction rate</div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="auth-right">
  <a href="index.html" class="auth-back">← Back to home</a>

  <div class="auth-right-inner">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignup" onclick="switchTab('signup')">Create account</button>
      <button class="auth-tab" id="tabLogin" onclick="switchTab('login')">Sign in</button>
    </div>

    <!-- SIGNUP FORM -->
    <form class="auth-form" id="formSignup">
      <div class="form-group">
        <label class="form-label" for="signupName">Full name</label>
        <input class="form-input" type="text" id="signupName" placeholder="Emma Thompson" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="signupEmail">Email</label>
        <input class="form-input" type="email" id="signupEmail" placeholder="you@university.edu" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="signupPassword">Password</label>
        <input class="form-input" type="password" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
      </div>

      <div class="form-error" id="signupError"></div>
      <div class="form-success" id="signupSuccess"></div>

      <button type="submit" class="btn-submit" id="btnSignup">
        <div class="spinner"></div>
        <span class="btn-text">Create free account</span>
      </button>

      <div class="divider">or</div>

      <button type="button" class="btn-google" id="btnGoogleSignup">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="form-footer">
        Already have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
      </div>
    </form>

    <!-- LOGIN FORM -->
    <form class="auth-form hidden" id="formLogin">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@university.edu" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <div style="text-align: right; margin-top: -0.5rem;">
        <a href="#" style="font-size:0.82rem; color:var(--sage); text-decoration:none;" id="forgotLink">Forgot password?</a>
      </div>

      <div class="form-error" id="loginError"></div>
      <div class="form-success" id="loginSuccess"></div>

      <button type="submit" class="btn-submit" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-text">Sign in</span>
      </button>

      <div class="divider">or</div>

      <button type="button" class="btn-google" id="btnGoogleLogin">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="form-footer">
        Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up free</a>
      </div>
    </form>
  </div>
</div>

<script>
// ── THEME ──────────────────────────────────────────────────
const saved = localStorage.getItem('flowdesk-theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);
else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
  document.documentElement.setAttribute('data-theme', 'dark');

// ── TAB SWITCHING ──────────────────────────────────────────
function switchTab(tab) {
  const isSignup = tab === 'signup';
  document.getElementById('tabSignup').classList.toggle('active', isSignup);
  document.getElementById('tabLogin').classList.toggle('active', !isSignup);
  document.getElementById('formSignup').classList.toggle('hidden', !isSignup);
  document.getElementById('formLogin').classList.toggle('hidden', isSignup);
}

// ── CHECK IF ALREADY LOGGED IN ─────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('profiles').select('onboarding_done').eq('id', session.user.id).single();
    window.location.href = profile?.onboarding_done ? 'dashboard.html' : 'onboarding.html';
  }
})();

// ── HELPERS ────────────────────────────────────────────────
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('visible');
}
function clearMessages(errorId, successId) {
  document.getElementById(errorId).classList.remove('visible');
  if (successId) document.getElementById(successId).classList.remove('visible');
}

// ── SIGNUP ─────────────────────────────────────────────────
document.getElementById('formSignup').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages('signupError', 'signupSuccess');
  setLoading('btnSignup', true);

  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;

  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });

  setLoading('btnSignup', false);

  if (error) {
    showError('signupError', error.message); return;
  }

  if (data.user && !data.session) {
    // Email confirmation required
    document.getElementById('signupSuccess').textContent =
      '✓ Check your email to confirm your account, then come back to sign in.';
    document.getElementById('signupSuccess').classList.add('visible');
    return;
  }

  // Signed up + auto-confirmed → go to onboarding
  window.location.href = 'onboarding.html';
});

// ── LOGIN ──────────────────────────────────────────────────
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages('loginError', 'loginSuccess');
  setLoading('btnLogin', true);

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  setLoading('btnLogin', false);

  if (error) { showError('loginError', error.message); return; }

  // Check onboarding status
  const { data: profile } = await sb.from('profiles').select('onboarding_done').eq('id', data.user.id).single();
  window.location.href = profile?.onboarding_done ? 'dashboard.html' : 'onboarding.html';
});

// ── GOOGLE OAUTH ───────────────────────────────────────────
async function googleLogin() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/onboarding.html' }
  });
  if (error) alert(error.message);
}
document.getElementById('btnGoogleSignup').addEventListener('click', googleLogin);
document.getElementById('btnGoogleLogin').addEventListener('click', googleLogin);

// ── FORGOT PASSWORD ────────────────────────────────────────
document.getElementById('forgotLink').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showError('loginError', 'Enter your email address first.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html'
  });
  if (error) { showError('loginError', error.message); return; }
  document.getElementById('loginSuccess').textContent = '✓ Password reset email sent — check your inbox.';
  document.getElementById('loginSuccess').classList.add('visible');
});
</script>
</body>
</html>
